<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users - MovieWeb App</title>
</head>
<body>

    <h1>Users</h1>
    <ul>
        {% for user_id, user in users.items() %}
            <li>
                <a href="/users/{{user_id}}">{{ user.name }}</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
